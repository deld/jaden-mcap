<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaden's MCAP Quest!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 12px 24px;
      gap: 10px;
    }

    /* ── STARS ── */
    .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
    .star  { position:absolute; border-radius:50%; background:white; animation:twinkle 3s infinite alternate; }
    @keyframes twinkle { from{opacity:.12} to{opacity:.8} }

    /* ── SUBJECT TOGGLE ── */
    #subject-toggle {
      position: relative; z-index: 12;
      display: flex; gap: 6px;
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 50px;
      padding: 5px;
    }
    .subject-btn {
      padding: 8px 24px; border: none; border-radius: 40px;
      font-size: .95rem; font-weight: 800; cursor: pointer;
      transition: all .2s; color: rgba(255,255,255,.75);
      background: transparent; letter-spacing: .3px;
    }
    .subject-btn.active {
      background: white; color: #0f3460;
      box-shadow: 0 3px 12px rgba(0,0,0,.2);
    }
    .subject-btn:hover:not(.active) { background: rgba(255,255,255,.2); color: white; }

    /* ── DOMAIN NAV ── */
    #domain-nav {
      position: relative; z-index: 10;
      width: 100%; max-width: 760px;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 8px;
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
    }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      padding: 8px 14px; border: none; border-radius: 14px;
      cursor: pointer; font-weight: 700; transition: all .2s;
      background: transparent; color: rgba(255,255,255,.7);
      min-width: 68px;
    }
    .nav-btn:hover { background: rgba(255,255,255,.15); color: white; }
    .nav-btn.active {
      background: white; color: #0f3460;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
      transform: translateY(-1px);
    }
    .nav-icon  { font-size: 1.3rem; line-height: 1; }
    .nav-label { font-size: .68rem; line-height: 1; letter-spacing: .3px; }
    .nav-code  { font-size: .72rem; font-weight: 800; line-height: 1; }
    .nav-count {
      font-size: .6rem; font-weight: 700; line-height: 1;
      background: rgba(0,0,0,.12); border-radius: 6px;
      padding: 1px 5px; margin-top: 1px;
    }
    .nav-btn.active .nav-count { background: rgba(15,52,96,.15); }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.97);
      border-radius: 24px; padding: 26px 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      width: 100%; max-width: 760px;
    }

    /* ── START SCREEN ── */
    #start-screen { text-align: center; }
    .subject-icon { font-size: 64px; animation: float 2s ease-in-out infinite alternate; display: block; margin-bottom: 10px; }
    @keyframes float { from{transform:translateY(0)} to{transform:translateY(-10px)} }
    #start-screen h1 { font-size: 2rem; color: #0f3460; margin-bottom: 6px; }
    .domain-banner {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 20px; border-radius: 30px; margin: 10px 0 14px;
      font-weight: 800; font-size: 1rem;
    }
    #start-screen p { font-size: .95rem; color: #555; margin-bottom: 18px; line-height: 1.6; }
    .start-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    /* ── BUTTONS ── */
    .btn { display:inline-block; padding:12px 28px; border:none; border-radius:50px; font-size:.97rem; font-weight:700; cursor:pointer; transition:transform .15s, box-shadow .15s; }
    .btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.22); }
    .btn:active { transform:translateY(0); }
    .btn-primary { background:linear-gradient(135deg,#e94560,#c41a43); color:white; }
    .btn-next    { background:linear-gradient(135deg,#0f3460,#1a6bb5); color:white; margin-top:12px; }
    .btn-check   { background:linear-gradient(135deg,#27ae60,#1e8449); color:white; margin-top:12px; }
    .btn-shuffle { background:linear-gradient(135deg,#f59e0b,#d97706); color:white; }

    /* ── HUD ── */
    .hud { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    .hud-left  { display:flex; flex-direction:column; gap:3px; }
    .hud-score { font-size:.97rem; font-weight:700; color:#0f3460; }
    .hud-score span { color:#e94560; font-size:1.2rem; }
    .streak-badge { font-size:.72rem; font-weight:700; color:#f59e0b; background:#fef3c7; padding:2px 8px; border-radius:10px; display:inline-block; }
    .hud-domain { font-size:.7rem; font-weight:700; color:#888; letter-spacing:.5px; text-transform:uppercase; }
    .progress-wrap { flex:1; min-width:100px; background:#e0e0e0; border-radius:10px; height:10px; overflow:hidden; }
    .progress-bar  { height:100%; border-radius:10px; background:linear-gradient(90deg,#e94560,#ffd700); transition:width .4s ease; }
    .q-counter { font-size:.82rem; color:#777; font-weight:600; white-space:nowrap; }

    /* ── CATEGORY CHIP ── */
    .cat-chip { display:inline-flex; align-items:center; gap:5px; padding:3px 11px; border-radius:20px; font-size:.73rem; font-weight:700; margin-bottom:8px; }

    /* ── PASSAGE CONTEXT BOX ── */
    .passage-box {
      background: #f0f4ff; border-left: 4px solid #0f3460;
      border-radius: 0 12px 12px 0; padding: 12px 15px;
      margin-bottom: 14px; font-size: .88rem; color: #334155;
      line-height: 1.65;
    }
    .passage-label {
      font-size: .68rem; font-weight: 800; color: #0f3460;
      text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 5px; display: block;
    }

    /* ── QUESTION ── */
    .q-text { font-size:1.08rem; color:#1a1a2e; font-weight:600; line-height:1.6; margin-bottom:16px; }
    .q-note { font-size:.83rem; color:#888; font-style:italic; margin-top:-8px; margin-bottom:12px; }

    /* ── OPTIONS ── */
    .options { display:flex; flex-direction:column; gap:8px; }
    .option {
      display:flex; align-items:center; gap:11px;
      padding:12px 15px; border:2.5px solid #ddd; border-radius:13px;
      cursor:pointer; transition:border-color .15s, background .15s;
      font-size:.95rem; color:#222;
    }
    .option:hover:not(.disabled) { border-color:#0f3460; background:#f0f4ff; }
    .option.selected { border-color:#0f3460; background:#e8f0fe; }
    .option.correct  { border-color:#27ae60; background:#eafaf1; }
    .option.wrong    { border-color:#e74c3c; background:#fdf0ef; }
    .option.disabled { cursor:default; }
    .opt-letter { width:28px; height:28px; border-radius:50%; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.87rem; flex-shrink:0; transition:background .15s, color .15s; }
    .option.selected .opt-letter { background:#0f3460; color:white; }
    .option.correct  .opt-letter { background:#27ae60; color:white; }
    .option.wrong    .opt-letter { background:#e74c3c; color:white; }

    /* ── NUMERIC ── */
    .numeric-wrap { display:flex; gap:10px; align-items:center; margin-top:6px; }
    .numeric-input { padding:12px 14px; font-size:1.4rem; border:2.5px solid #ddd; border-radius:13px; width:120px; text-align:center; font-weight:700; color:#0f3460; outline:none; transition:border-color .15s; }
    .numeric-input:focus  { border-color:#0f3460; }
    .numeric-input.correct{ border-color:#27ae60; background:#eafaf1; }
    .numeric-input.wrong  { border-color:#e74c3c; background:#fdf0ef; }

    /* ── FEEDBACK ── */
    .feedback { margin-top:12px; padding:13px 16px; border-radius:13px; font-size:.93rem; font-weight:600; line-height:1.5; display:none; }
    .feedback.show { display:block; }
    .feedback.correct-fb { background:#eafaf1; border:2px solid #27ae60; color:#1e8449; }
    .feedback.wrong-fb   { background:#fdf0ef; border:2px solid #e74c3c; color:#c0392b; }
    .fb-icon   { font-size:1.2rem; margin-right:5px; }
    .hint-text { color:#555; font-weight:400; margin-top:5px; font-size:.85rem; }

    /* ── STREAK POPUP ── */
    .streak-popup { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#f59e0b,#d97706); color:white; padding:10px 24px; border-radius:30px; font-size:1.05rem; font-weight:800; z-index:999; pointer-events:none; animation:streakIn .4s ease forwards; display:none; }
    @keyframes streakIn { 0%{opacity:0;top:-20px} 30%{opacity:1;top:70px} 80%{opacity:1;top:66px} 100%{opacity:0;top:40px} }

    /* ── BAR CHART ── */
    .bar-chart-wrap { margin:10px 0; }
    .chart-title { font-size:.82rem; font-weight:700; color:#333; margin-bottom:5px; }
    .bar-chart { border-left:3px solid #333; border-bottom:3px solid #333; display:flex; align-items:flex-end; gap:12px; height:100px; padding-left:8px; }
    .bar-group { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .bar { width:32px; border-radius:4px 4px 0 0; background:linear-gradient(180deg,#e94560,#c41a43); }
    .bar-label { font-size:.65rem; font-weight:600; color:#444; text-align:center; max-width:40px; }
    .bar-val   { font-size:.72rem; font-weight:700; color:#0f3460; }

    /* ── END SCREEN ── */
    #end-screen { text-align:center; }
    .trophy { font-size:64px; display:block; margin-bottom:10px; animation:bounce .6s infinite alternate; }
    @keyframes bounce { from{transform:scale(1)} to{transform:scale(1.08)} }
    #end-screen h2 { font-size:1.8rem; color:#0f3460; margin-bottom:6px; }
    .final-score { font-size:2.8rem; font-weight:900; color:#e94560; margin:8px 0; }
    .final-msg   { font-size:.95rem; color:#555; margin-bottom:10px; line-height:1.6; }
    .stars-row   { font-size:1.9rem; margin-bottom:10px; letter-spacing:3px; }
    .stats-row   { display:flex; justify-content:center; gap:20px; margin-bottom:18px; flex-wrap:wrap; }
    .stat-box    { background:#f0f4ff; border-radius:12px; padding:9px 16px; text-align:center; }
    .stat-num    { font-size:1.5rem; font-weight:800; color:#0f3460; }
    .stat-label  { font-size:.72rem; color:#666; font-weight:600; }

    /* ── CONFETTI ── */
    .confetti-piece { position:fixed; top:-10px; width:10px; height:14px; border-radius:2px; animation:confettiFall linear forwards; z-index:999; pointer-events:none; }
    @keyframes confettiFall { to{transform:translateY(110vh) rotate(720deg);opacity:0} }

    .hidden { display:none !important; }
    .text-center { text-align:center; }
    .mt-10 { margin-top:10px; }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- ══ SUBJECT TOGGLE ══ -->
<div id="subject-toggle">
  <button class="subject-btn active" id="btn-math" onclick="switchSubject('Math')">🔢 Math</button>
  <button class="subject-btn" id="btn-reading" onclick="switchSubject('Reading')">📚 Reading</button>
</div>

<!-- ══ DOMAIN NAV ══ -->
<nav id="domain-nav"></nav>

<div id="app">
  <!-- START SCREEN -->
  <div id="start-screen" class="card">
    <span class="subject-icon" id="subject-icon">🚀</span>
    <h1 id="start-title">Jaden's Math Quest!</h1>
    <div class="domain-banner" id="domain-banner"></div>
    <p id="start-desc"></p>
    <div class="start-btns">
      <button class="btn btn-primary" onclick="startGame(false)">▶ Start in Order</button>
      <button class="btn btn-shuffle" onclick="startGame(true)">🔀 Shuffle &amp; Play</button>
    </div>
  </div>

  <!-- QUESTION SCREEN -->
  <div id="question-screen" class="card hidden">
    <div class="hud">
      <div class="hud-left">
        <div class="hud-score">⭐ <span id="score-display">0</span> stars</div>
        <div id="streak-display" class="streak-badge hidden">🔥 Streak: <span id="streak-count">0</span></div>
        <div class="hud-domain" id="hud-domain"></div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
      <div class="q-counter" id="q-counter"></div>
    </div>
    <div class="cat-chip" id="cat-chip"></div>
    <div class="passage-box hidden" id="passage-box">
      <span class="passage-label">📖 Story Context</span>
      <span id="passage-text"></span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="q-note hidden" id="q-note"></div>
    <div id="chart-area"></div>
    <div class="options" id="options-area"></div>
    <div class="numeric-wrap hidden" id="numeric-area">
      <input class="numeric-input" id="numeric-input" type="number" placeholder="?" autocomplete="off">
      <button class="btn btn-check" onclick="checkNumeric()">Check!</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="text-center">
      <button class="btn btn-check hidden" id="check-btn" onclick="checkMulti()">Check My Answers!</button>
      <button class="btn btn-next  hidden" id="next-btn"  onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <!-- END SCREEN -->
  <div id="end-screen" class="card hidden">
    <span class="trophy" id="trophy-icon">🏆</span>
    <h2 id="end-title">Quest Complete!</h2>
    <div class="stars-row" id="stars-row"></div>
    <div class="final-score" id="final-score"></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="stat-pct"></div><div class="stat-label">Accuracy</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-streak"></div><div class="stat-label">Best Streak</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-domain"></div><div class="stat-label">Topic</div></div>
    </div>
    <div class="final-msg" id="final-msg"></div>
    <div class="start-btns mt-10">
      <button class="btn btn-primary" onclick="startGame(false)">▶ Play Again</button>
      <button class="btn btn-shuffle" onclick="startGame(true)">🔀 Shuffle</button>
    </div>
  </div>
</div>

<div class="streak-popup" id="streak-popup"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  MATH DOMAIN DEFINITIONS
// ═══════════════════════════════════════════════════════════════════
const MATH_DOMAINS = [
  { id:'All', label:'All Topics',     code:'ALL', icon:'🚀', bg:'#1a1a2e', fg:'white'  },
  { id:'OA',  label:'Operations & Algebraic Thinking', code:'OA', icon:'✖️', bg:'#fde68a', fg:'#78350f' },
  { id:'NBT', label:'Number & Operations in Base Ten', code:'NBT',icon:'🔢', bg:'#bfdbfe', fg:'#1e3a5f' },
  { id:'NF',  label:'Number & Operations—Fractions',   code:'NF', icon:'🍕', bg:'#fce7f3', fg:'#9d174d' },
  { id:'MD',  label:'Measurement & Data',              code:'MD', icon:'📐', bg:'#d1fae5', fg:'#065f46' },
  { id:'G',   label:'Geometry',                        code:'G',  icon:'🔷', bg:'#ede9fe', fg:'#4c1d95' },
];

// ═══════════════════════════════════════════════════════════════════
//  ELA DOMAIN DEFINITIONS
// ═══════════════════════════════════════════════════════════════════
const ELA_DOMAINS = [
  { id:'All', label:'All Reading',         code:'ALL', icon:'📚', bg:'#1a1a2e', fg:'white'  },
  { id:'RL',  label:'Literary Text',       code:'RL',  icon:'📖', bg:'#fce7f3', fg:'#9d174d' },
  { id:'RI',  label:'Informational Text',  code:'RI',  icon:'📰', bg:'#dbeafe', fg:'#1e3a5f' },
  { id:'L',   label:'Language',            code:'L',   icon:'🔤', bg:'#d1fae5', fg:'#065f46' },
];

// ═══════════════════════════════════════════════════════════════════
//  CAT STYLE (colored chip per sub-category)
// ═══════════════════════════════════════════════════════════════════
const CAT_STYLE = {
  // Math
  'Multiplication':            { bg:'#fde68a', fg:'#78350f' },
  'Division':                  { bg:'#fef3c7', fg:'#92400e' },
  'Mult & Division Reasoning': { bg:'#ddd6fe', fg:'#4c1d95' },
  'Addition & Subtraction':    { bg:'#bbf7d0', fg:'#14532d' },
  'Rounding':                  { bg:'#fed7aa', fg:'#7c2d12' },
  'Fractions':                 { bg:'#fce7f3', fg:'#9d174d' },
  'Measurement & Time':        { bg:'#bfdbfe', fg:'#1e3a5f' },
  'Area':                      { bg:'#d1fae5', fg:'#065f46' },
  'Perimeter':                 { bg:'#ccfbf1', fg:'#134e4a' },
  'Word Problems':             { bg:'#fef9c3', fg:'#713f12' },
  'Data & Graphs':             { bg:'#e0f2fe', fg:'#0c4a6e' },
  'Geometry':                  { bg:'#ede9fe', fg:'#4c1d95' },
  // ELA
  'Literary Text':             { bg:'#fce7f3', fg:'#9d174d' },
  'Informational Text':        { bg:'#dbeafe', fg:'#1e3a5f' },
  'Vocabulary':                { bg:'#d1fae5', fg:'#065f46' },
  'Word Study':                { bg:'#fef3c7', fg:'#92400e' },
};

// ═══════════════════════════════════════════════════════════════════
//  MATH QUESTIONS  (domain = OA | NBT | NF | MD | G)
// ═══════════════════════════════════════════════════════════════════
const MATH_QUESTIONS = [

  // ── OA · MULTIPLICATION ─────────────────────────────────────────
  { domain:'OA', cat:'Multiplication',
    text:'A teacher wrote a word problem for the expression 8 × 2. Which of these could be the teacher\'s word problem?',
    type:'single',
    options:['There were 8 baskets with 2 apples in each basket. How many apples total?',
             'There were 8 apples divided equally into 2 baskets. How many in each basket?',
             'There were 8 apples. A student added 2 more. How many apples now?',
             'There were 8 apples. A chef used 2 of them. How many are left?'],
    correct:['A'],
    hint:'8 × 2 means 8 equal groups of 2. Option A has 8 groups (baskets) of 2 — perfect for multiplication!' },

  { domain:'OA', cat:'Multiplication',
    text:'A music teacher placed students in 4 rows to sing in a concert. There were 20 students in each row. What was the TOTAL number of students?',
    type:'numeric', correct:80,
    hint:'4 rows × 20 students each = 4 × 20 = 80.' },

  { domain:'OA', cat:'Multiplication',
    text:'What is 9 × 6?',
    type:'numeric', correct:54,
    hint:'Think: 10 × 6 = 60, then subtract one 6 → 60 − 6 = 54!' },

  { domain:'OA', cat:'Multiplication',
    text:'What number makes this equation true?\n8 × □ = 48',
    type:'numeric', correct:6,
    hint:'Use the opposite: 48 ÷ 8 = 6. So □ = 6!' },

  { domain:'OA', cat:'Multiplication',
    text:'A baker made 5 trays of cookies with 8 cookies on each tray. How many cookies are there in all?',
    type:'numeric', correct:40,
    hint:'5 × 8 = 40. Five groups of eight!' },

  { domain:'OA', cat:'Multiplication',
    text:'A farmer has 4 rows of apple trees with 9 trees in each row. Which expression finds the TOTAL number of trees?',
    type:'single',
    options:['9 + 4','9 × 4','9 − 4','9 ÷ 4'],
    correct:['B'],
    hint:'4 equal groups of 9 = 4 × 9 = 9 × 4 = 36.' },

  { domain:'OA', cat:'Multiplication',
    text:'Which expression shows the total number of marbles in 4 jars with 8 marbles each?',
    type:'single',
    options:['4 × 8','4 + 8','4 + 4 + 4 + 4','8+8+8+8+8+8+8+8'],
    correct:['A'],
    hint:'4 equal groups of 8 = 4 × 8. That\'s multiplication!' },

  { domain:'OA', cat:'Multiplication',
    text:'Christy bought 9 bottles of lemonade. Each bottle contains 2 liters. How many liters total?',
    type:'numeric', correct:18,
    hint:'9 × 2 = 18 liters.' },

  { domain:'OA', cat:'Multiplication',
    text:'What is 7 × 2?',
    type:'numeric', correct:14,
    hint:'7 × 2 = 14. Or think: 7 + 7 = 14.' },

  { domain:'OA', cat:'Multiplication',
    text:'A student arranged pennies in 4 rows of 5. What is the total number of pennies?',
    type:'numeric', correct:20,
    hint:'4 rows × 5 pennies = 4 × 5 = 20.' },

  // ── OA · DIVISION ───────────────────────────────────────────────
  { domain:'OA', cat:'Division',
    text:'What number makes this equation true?\n30 ÷ □ = 5',
    type:'numeric', correct:6,
    hint:'□ × 5 = 30 → 30 ÷ 5 = 6!' },

  { domain:'OA', cat:'Division',
    text:'What number makes this equation true?\n45 ÷ □ = 5',
    type:'numeric', correct:9,
    hint:'□ × 5 = 45 → 45 ÷ 5 = 9!' },

  { domain:'OA', cat:'Division',
    text:'Find the quotient:  28 ÷ 4 = ?',
    type:'single', options:['6','7','8','9'], correct:['B'],
    hint:'4 × 7 = 28, so 28 ÷ 4 = 7!' },

  { domain:'OA', cat:'Division',
    text:'A division equation is shown: 70 ÷ 10 = ?\nWhich multiplication equation could help solve it?',
    type:'single',
    options:['? = 10 × 70','10 = ? × 7','? × 10 = 7','10 × ? = 70'],
    correct:['D'],
    hint:'Division and multiplication are opposites! 70 ÷ 10 = ? means 10 × ? = 70.' },

  { domain:'OA', cat:'Division',
    text:'Riley has 63 coins and places the SAME number in each of 9 containers. Which statement represents 63 ÷ 9?',
    type:'single',
    options:['Riley gives his sister 9 coins.','Riley\'s friend gives him 9 more coins.','Riley places coins equally into 9 containers.','Riley places different amounts in 9 containers.'],
    correct:['C'],
    hint:'Division = splitting into equal groups. 63 ÷ 9 = 7 per container.' },

  { domain:'OA', cat:'Division',
    text:'There are 63 cars parked in 7 equal rows. How many cars are in each row?',

//  STATE
// ═══════════════════════════════════════════════════════════════════
let activeSubject = 'Math';
let activeDomain  = 'All';

function currentDomains()   { return activeSubject === 'Math' ? MATH_DOMAINS   : ELA_DOMAINS; }
function currentQuestions() { return activeSubject === 'Math' ? MATH_QUESTIONS : ELA_QUESTIONS; }

// ═══════════════════════════════════════════════════════════════════
//  NAV SETUP
// ═══════════════════════════════════════════════════════════════════
function buildNav() {
  // Update subject toggle buttons
  document.getElementById('btn-math').classList.toggle('active', activeSubject === 'Math');
  document.getElementById('btn-reading').classList.toggle('active', activeSubject === 'Reading');

  const nav = document.getElementById('domain-nav');
  nav.innerHTML = '';
  const domains = currentDomains();
  const qs = currentQuestions();
  const counts = {};
  qs.forEach(q => { counts[q.domain] = (counts[q.domain]||0)+1; });
  const total = qs.length;

  domains.forEach(d => {
    const cnt = d.id==='All' ? total : (counts[d.id]||0);
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (d.id===activeDomain ? ' active' : '');
    btn.innerHTML = `<span class="nav-icon">${d.icon}</span><span class="nav-code">${d.code}</span><span class="nav-count">${cnt}q</span>`;
    btn.title = d.label;
    btn.onclick = () => switchDomain(d.id);
    nav.appendChild(btn);
  });
}

function switchSubject(subj) {
  activeSubject = subj;
  activeDomain  = 'All';
  buildNav();
  updateStartScreen();
  show('start-screen');
}

function switchDomain(id) {
  activeDomain = id;
  buildNav();
  updateStartScreen();
  show('start-screen');
}

function updateStartScreen() {
  const d = currentDomains().find(x => x.id === activeDomain);
  const banner = document.getElementById('domain-banner');
  banner.style.background = d.bg;
  banner.style.color = d.fg;

  const qs = filteredQuestions();
  banner.textContent = `${d.icon}  ${d.label}`;

  // Title & icon based on subject + domain
  if (activeSubject === 'Math') {
    document.getElementById('subject-icon').textContent = activeDomain === 'All' ? '🚀' : (currentDomains().find(x=>x.id===activeDomain)||{icon:'🚀'}).icon;
    document.getElementById('start-title').textContent = 'Jaden\'s Math Quest!';
  } else {
    document.getElementById('subject-icon').textContent = activeDomain === 'All' ? '📚' : (currentDomains().find(x=>x.id===activeDomain)||{icon:'📚'}).icon;
    document.getElementById('start-title').textContent = 'Jaden\'s Reading Quest!';
  }

  const desc = document.getElementById('start-desc');
  const domainName = activeSubject === 'Math' ? 'Grade 3 MCAP math topics' : 'Grade 3 MCAP reading skills';
  if (activeDomain === 'All') {
    desc.innerHTML = `<strong>${qs.length} questions</strong> covering all ${domainName}!<br>Get 3 correct in a row for a 🔥 streak bonus!`;
  } else {
    desc.innerHTML = `<strong>${qs.length} questions</strong> focused on <em>${d.label}</em>.<br>Get 3 correct in a row for a 🔥 streak bonus!`;
  }
}

function filteredQuestions() {
  const qs = currentQuestions();
  if (activeDomain === 'All') return [...qs];
  return qs.filter(q => q.domain === activeDomain);
}

// ═══════════════════════════════════════════════════════════════════
//  GAME STATE & LOGIC
// ═══════════════════════════════════════════════════════════════════
let questions=[], currentQ=0, score=0, streak=0, bestStreak=0, selected=new Set(), answered=false;

function show(id) {
  ['start-screen','question-screen','end-screen'].forEach(s=>
    document.getElementById(s).classList.toggle('hidden', s!==id));
}

function startGame(shuffle) {
  questions = filteredQuestions();
  if (shuffle) {
    for (let i=questions.length-1;i>0;i--) {
      const j=Math.floor(Math.random()*(i+1));
      [questions[i],questions[j]]=[questions[j],questions[i]];
    }
  }
  currentQ=0; score=0; streak=0; bestStreak=0;
  show('question-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  answered=false; selected=new Set();

  document.getElementById('score-display').textContent = score;
  document.getElementById('q-counter').textContent = `${currentQ+1} / ${questions.length}`;
  document.getElementById('progress-bar').style.width = `${(currentQ/questions.length)*100}%`;

  const sd = document.getElementById('streak-display');
  if (streak>=2) { sd.classList.remove('hidden'); document.getElementById('streak-count').textContent=streak; }
  else sd.classList.add('hidden');

  const d = currentDomains().find(x=>x.id===q.domain);
  document.getElementById('hud-domain').textContent = d ? d.label : '';

  // category chip
  const chip = document.getElementById('cat-chip');
  const cs = CAT_STYLE[q.cat]||{bg:'#eee',fg:'#333'};
  chip.style.background=cs.bg; chip.style.color=cs.fg;
  chip.textContent = q.cat;

  // passage context box (ELA questions)
  const pb = document.getElementById('passage-box');
  const pt = document.getElementById('passage-text');
  if (q.passage) {
    pt.textContent = q.passage;
    pb.classList.remove('hidden');
  } else {
    pb.classList.add('hidden');
  }

  document.getElementById('q-text').innerHTML = q.text.replace(/\n/g,'<br>');

  const noteEl = document.getElementById('q-note');
  if (q.note) { noteEl.textContent=q.note; noteEl.classList.remove('hidden'); }
  else noteEl.classList.add('hidden');

  // chart
  const ca = document.getElementById('chart-area');
  ca.innerHTML='';
  if (q.chart) {
    ca.innerHTML=`<div class="bar-chart-wrap"><div class="chart-title">📊 Favorite Sport</div><div class="bar-chart">${
      [['Volleyball',4],['Swimming',6],['Golf',2],['Track',8],['Baseball',5]].map(([n,v])=>`
      <div class="bar-group"><div class="bar-val">${v}</div><div class="bar" style="height:${v*10}px"></div><div class="bar-label">${n}</div></div>`).join('')
    }</div></div>`;
  }

  // reset
  const fb=document.getElementById('feedback');
  fb.className='feedback'; fb.innerHTML='';
  document.getElementById('check-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');

  const oa=document.getElementById('options-area');
  const na=document.getElementById('numeric-area');
  const ni=document.getElementById('numeric-input');
  oa.innerHTML=''; na.classList.add('hidden');
  ni.value=''; ni.className='numeric-input'; ni.disabled=false;

  const L='ABCDEFGHIJ';
  if (q.type==='numeric') {
    na.classList.remove('hidden');
    ni.onkeydown = e=>{ if(e.key==='Enter') checkNumeric(); };
    setTimeout(()=>ni.focus(),50);
  } else {
    q.options.forEach((opt,i)=>{
      const letter=L[i];
      const div=document.createElement('div');
      div.className='option'; div.dataset.letter=letter;
      div.innerHTML=`<div class="opt-letter">${letter}</div><div>${opt}</div>`;
      div.addEventListener('click',()=>selectOption(div,letter,q.type));
      oa.appendChild(div);
    });
    if (q.type==='multi') document.getElementById('check-btn').classList.remove('hidden');
  }
}

function selectOption(el,letter,type) {
  if (answered) return;
  if (type==='single') {
    document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
    el.classList.add('selected');
    selected=new Set([letter]);
    revealSingle(letter);
  } else {
    if (selected.has(letter)){ selected.delete(letter); el.classList.remove('selected'); }
    else { selected.add(letter); el.classList.add('selected'); }
  }
}

function revealSingle(chosen) {
  const q=questions[currentQ]; answered=true;
  const ok=q.correct.includes(chosen);
  document.querySelectorAll('.option').forEach(o=>{
    o.classList.add('disabled');
    if(q.correct.includes(o.dataset.letter)) o.classList.add('correct');
    else if(o.dataset.letter===chosen&&!ok) o.classList.add('wrong');
  });
  updateScore(ok); showFeedback(ok,q);
  document.getElementById('next-btn').classList.remove('hidden');
}

function checkMulti() {
  const q=questions[currentQ];
  if(selected.size===0) return;
  answered=true;
  const cs=new Set(q.correct);
  const ok=selected.size===cs.size&&[...selected].every(l=>cs.has(l));
  document.querySelectorAll('.option').forEach(o=>{
    o.classList.add('disabled');
    if(cs.has(o.dataset.letter)) o.classList.add('correct');
    else if(selected.has(o.dataset.letter)) o.classList.add('wrong');
  });
  updateScore(ok); showFeedback(ok,q);
  document.getElementById('check-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
}

function checkNumeric() {
  const q=questions[currentQ];
  const ni=document.getElementById('numeric-input');
  const val=parseInt(ni.value,10);
  if(isNaN(val)) return;
  answered=true;
  const ok=val===q.correct;
  ni.className='numeric-input '+(ok?'correct':'wrong');
  ni.disabled=true;
  updateScore(ok); showFeedback(ok,q);
  document.getElementById('next-btn').classList.remove('hidden');
}

function updateScore(ok) {
  if(ok){
    score++; streak++;
    if(streak>bestStreak) bestStreak=streak;
    document.getElementById('score-display').textContent=score;
    const sd=document.getElementById('streak-display');
    document.getElementById('streak-count').textContent=streak;
    if(streak>=2) sd.classList.remove('hidden');
    if([3,5,7,10].includes(streak)) showStreakPopup(streak);
  } else {
    streak=0;
    document.getElementById('streak-display').classList.add('hidden');
  }
}

const CORRECT_MSGS=['Awesome! You nailed it! 🌟','Fantastic! 🎉','Superstar! ⭐','Boom! Correct! 🚀','Yes! Exactly right! 🎯','Incredible! 💥','Brilliant! 🧠'];
const WRONG_MSGS  =['Almost! Here\'s the trick:','Not quite — let\'s learn this:','Good try! Here\'s how:','No worries! Here\'s the answer:'];

function showFeedback(ok,q) {
  const fb=document.getElementById('feedback');
  const msg=ok?CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)]:WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)];
  const correctLabel=q.type==='numeric'?`Answer: <strong>${q.correct}</strong>`:`Correct: <strong>${q.correct.join(', ')}</strong>`;
  fb.className=`feedback show ${ok?'correct-fb':'wrong-fb'}`;
  fb.innerHTML=`<span class="fb-icon">${ok?'✅':'❌'}</span> ${msg}${!ok?`<br>${correctLabel}`:''}<div class="hint-text">💡 ${q.hint}</div>`;
  if(ok) launchConfetti();
}

function showStreakPopup(n) {
  const p=document.getElementById('streak-popup');
  const msgs={3:'🔥 3 in a row!',5:'🔥🔥 5 streak! On fire!',7:'💥 7 streak! Unstoppable!',10:'🏆 10 streak! LEGEND!'};
  p.textContent=msgs[n]||`🔥 ${n} streak!`;
  p.style.display='block';
  p.style.animation='none'; void p.offsetWidth;
  p.style.animation='streakIn 1.6s ease forwards';
  setTimeout(()=>p.style.display='none',1600);
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length) showEndScreen();
  else renderQuestion();
}

function showEndScreen() {
  document.getElementById('progress-bar').style.width='100%';
  const total=questions.length, pct=score/total;
  let trophy,starsHtml,msg;
  const isReading = activeSubject === 'Reading';
  if(pct===1)       { trophy='🏆'; starsHtml='⭐⭐⭐⭐⭐'; msg=isReading ? 'PERFECT SCORE! You are an absolute reading champion, Jaden! 🎉 Ready for MCAP ELA!' : 'PERFECT SCORE! You are an absolute math champion, Jaden! 🎉 Totally ready for the MCAP!'; }
  else if(pct>=.85) { trophy='🥇'; starsHtml='⭐⭐⭐⭐✨'; msg='Amazing job! You really know your stuff! Review the ones you missed and you\'ll be unbeatable! 💪'; }
  else if(pct>=.7)  { trophy='🥈'; starsHtml='⭐⭐⭐✨✨'; msg='Great work! You\'re getting stronger every practice! Keep going! 🌟'; }
  else if(pct>=.5)  { trophy='🌟'; starsHtml='⭐⭐✨✨✨'; msg='Good effort! Every practice makes you better. Play again and watch your score climb! 💫'; }
  else              { trophy='🚀'; starsHtml='⭐✨✨✨✨'; msg='Keep going! This takes practice. You\'ve totally got this! 🚀'; }

  const d = currentDomains().find(x=>x.id===activeDomain);
  document.getElementById('trophy-icon').textContent=trophy;
  document.getElementById('stars-row').textContent=starsHtml;
  document.getElementById('final-score').textContent=`${score} / ${total}`;
  document.getElementById('stat-pct').textContent=Math.round(pct*100)+'%';
  document.getElementById('stat-streak').textContent='🔥 '+bestStreak;
  document.getElementById('stat-domain').textContent=d?d.icon+' '+d.code:'ALL';
  document.getElementById('end-title').textContent = isReading ? 'Reading Quest Complete!' : 'Math Quest Complete!';
  document.getElementById('final-msg').textContent=msg;
  show('end-screen');
  if(pct>=.7) for(let i=0;i<80;i++) setTimeout(launchConfettiPiece,i*45);
}

function launchConfetti() { for(let i=0;i<16;i++) setTimeout(launchConfettiPiece,i*35); }
function launchConfettiPiece() {
  const cols=['#e94560','#ffd700','#27ae60','#3498db','#9b59b6','#f39c12'];
  const el=document.createElement('div');
  el.className='confetti-piece';
  el.style.cssText=`left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${.8+Math.random()*1.2}s;transform:rotate(${Math.random()*360}deg)`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

// ── STARS BG ───────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(s);
  }
})();

// ── INIT ───────────────────────────────────────────────────────────
buildNav();
updateStartScreen();
show('start-screen');
</script>
